services:
  postgres:
    image: postgres:18
    container_name: sunubrt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sunubrt-network

  redis:
    image: redis:latest
    container_name: sunubrt-redis
    ports:
      - '6379:6379'
    networks:
      - sunubrt-network

  app:
    image: node:24-alpine
    container_name: sunubrt-app-dev
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    ports:
      - '3000:3000'
      - '9229:9229'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PAYDUNYA_MASTER_KEY: ${PAYDUNYA_MASTER_KEY}
      PAYDUNYA_PRIVATE_KEY: ${PAYDUNYA_PRIVATE_KEY}
      PAYDUNYA_TOKEN: ${PAYDUNYA_TOKEN}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: UsePolling
      WATCHPACK_POLLING: 'true'
      WATCHPACK_POLLING_INTERVAL: '1000'
      CHOKIDAR_INTERVAL: '1000'
    volumes:
      - ./:/app
      - node_modules:/app/node_modules

    depends_on:
      - postgres
      - redis
    develop:
      watch:
        - path: .
          target: /app
          action: sync
          ignore:
            - node_modules/

            - dist/
            - coverage/

            - .git/
        - path: package.json

          action: rebuild

        - path: package-lock.json

          action: rebuild

    networks:
      - sunubrt-network

volumes:
  postgres_data:
  node_modules:

networks:
  sunubrt-network:
    driver: bridge
